# Release workflow - creates releases and triggers deployment
name: Release

on:
  push:
    tags:
      - "v*.*.*" # Triggers on version tags like v1.0.0, v2.1.3
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 1.2, 1.2.3, or v1.2.3)"
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:run

  prepare:
    name: Prepare Release
    needs: test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}

    steps:
      - uses: actions/checkout@v4

      - name: Resolve release version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            raw_version='${{ inputs.version }}'
          else
            raw_version='${GITHUB_REF#refs/tags/}'
          fi

          version="${raw_version#v}"

          if [[ "$version" =~ ^[0-9]+\.[0-9]+$ ]]; then
            version="$version.0"
          fi

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release version: '$raw_version'"
            echo "Use semantic versioning like 1.2.3, 1.2.3-rc.1, or v1.2.3"
            exit 1
          fi

          tag="v$version"
          is_prerelease=false
          if [[ "$version" == *-* ]]; then
            is_prerelease=true
          fi

          echo "version=$version" >> $GITHUB_OUTPUT
          echo "tag=$tag" >> $GITHUB_OUTPUT
          echo "is_prerelease=$is_prerelease" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Update package.json version
        run: npm version ${{ steps.version.outputs.version }} --no-git-tag-version

      - name: Build
        run: npm run build

  publish-image:
    name: Publish Container Image
    needs: prepare
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/rsvp-reader
          tags: |
            type=semver,pattern={{version}},value=${{ needs.prepare.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.prepare.outputs.version }}
            type=semver,pattern={{major}},value=${{ needs.prepare.outputs.version }}
            type=raw,value=latest,enable=${{ needs.prepare.outputs.is_prerelease != 'true' }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release:
    name: Create Release
    needs: [prepare, publish-image]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          # Get previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -n "$PREV_TAG" ]; then
            echo "## Changes since $PREV_TAG" > CHANGELOG.md
            echo "" >> CHANGELOG.md
            git log --pretty=format:"- %s (%h)" $PREV_TAG..HEAD >> CHANGELOG.md
          else
            echo "## Initial Release" > CHANGELOG.md
            echo "" >> CHANGELOG.md
            echo "First release of RSVP Reader" >> CHANGELOG.md
          fi

      - name: Build release notes
        run: |
          {
            cat CHANGELOG.md
            echo ""
            echo "## Container Images"
            echo ""
            echo "- App: ghcr.io/${{ github.repository_owner }}/rsvp-reader:${{ needs.prepare.outputs.version }}"
            if [[ "${{ needs.prepare.outputs.is_prerelease }}" != "true" ]]; then
              echo "- Stable tags also updated: ghcr.io/${{ github.repository_owner }}/rsvp-reader:latest"
            fi
          } > RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: Release v${{ needs.prepare.outputs.version }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: ${{ needs.prepare.outputs.is_prerelease == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify-publish:
    name: Publish Summary
    needs: [prepare, release]
    runs-on: ubuntu-latest

    steps:
      - name: Publish notification
        run: |
          echo "🚀 Release v${{ needs.prepare.outputs.version }} created!"
          echo ""
          echo "Published container images to GitHub Container Registry:"
          echo ""
          echo "- ghcr.io/${{ github.repository_owner }}/rsvp-reader:${{ needs.prepare.outputs.version }}"
